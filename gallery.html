<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KE18YKR60H"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KE18YKR60H');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mind Canvas — 감정 갤러리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Serif+KR:wght@300;400;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #0d0d0f;
      --gold: #c9a84c;
      --ember: #d4623a;
      --jade: #4a8c7a;
      --violet: #6b5b8a;
      --ash: #9b9aa3;
      --cream: #ede8dd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--ink);
      color: var(--cream);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
    }

    #bgCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0.3;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* Header */
    .header {
      padding: 48px 0 40px;
      text-align: center;
    }
    .logo-mark {
      width: 44px; height: 44px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--ember), var(--gold), var(--jade), var(--violet), var(--ember));
      animation: spinSlow 12s linear infinite;
      position: relative;
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: var(--ink);
    }
    @keyframes spinSlow { to { transform: rotate(360deg); } }

    .site-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(26px, 4vw, 38px);
      background: linear-gradient(135deg, var(--gold), var(--cream), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.05em;
    }
    .site-sub {
      font-family: 'Gowun Batang', serif;
      font-size: 13px;
      color: var(--ash);
      letter-spacing: 0.2em;
      margin-top: 6px;
    }
    .header-desc {
      font-family: 'Gowun Batang', serif;
      font-size: 14px;
      color: var(--ash);
      margin-top: 16px;
      line-height: 1.8;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      color: var(--ash);
      font-family: 'Noto Serif KR', serif;
      font-size: 13px;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 8px 16px;
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--cream); border-color: rgba(255,255,255,0.3); }

    /* Stats */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin: 0 0 40px;
      padding: 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--gold);
    }
    .stat-label {
      font-family: 'Gowun Batang', serif;
      font-size: 12px;
      color: var(--ash);
      margin-top: 2px;
    }

    /* Gallery grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .gallery-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      animation: fadeUp 0.5s ease both;
    }
    .gallery-card:hover {
      border-color: rgba(201,168,76,0.35);
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .gallery-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: rgba(255,255,255,0.03);
    }

    .gallery-body {
      padding: 16px 18px 20px;
    }
    .gallery-title {
      font-family: 'Gowun Batang', serif;
      font-size: 16px;
      color: var(--cream);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .gallery-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .gallery-tag {
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 12px;
      font-family: 'Gowun Batang', serif;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--gold);
    }
    .gallery-date {
      font-size: 11px;
      color: var(--ash);
      font-family: 'DM Serif Display', serif;
      letter-spacing: 0.1em;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(13,13,15,0.96);
      backdrop-filter: blur(20px);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .lightbox.open { display: flex; }
    .lightbox-inner {
      max-width: 560px;
      width: 100%;
      animation: fadeUp 0.3s ease;
    }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--ash);
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .lightbox-close:hover { color: var(--cream); }
    .lightbox-img {
      width: 100%;
      border-radius: 18px;
      display: block;
      margin-bottom: 20px;
    }
    .lightbox-title {
      font-family: 'Gowun Batang', serif;
      font-size: 22px;
      color: var(--cream);
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .lightbox-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    .lightbox-date {
      font-size: 12px;
      color: var(--ash);
      font-family: 'DM Serif Display', serif;
    }

    /* Loading */
    .loading-wrap {
      text-align: center;
      padding: 80px 0;
      color: var(--ash);
      font-family: 'Gowun Batang', serif;
    }
    .loading-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .loading-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--ash);
      animation: bounce 1.2s ease infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* Empty */
    .empty-wrap {
      text-align: center;
      padding: 80px 0;
      color: var(--ash);
      font-family: 'Gowun Batang', serif;
      font-size: 16px;
      line-height: 2;
      grid-column: 1 / -1;
    }

    @media (max-width: 520px) {
      .gallery-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .stats-bar { gap: 16px; }
    }
  </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="wrap">
  <div class="header">
    <div class="logo-mark"></div>
    <h1 class="site-title">Mind Canvas</h1>
    <p class="site-sub">감정 갤러리</p>
    <p class="header-desc">
      이곳의 작품들은 각자의 감정을 탐색하며 만들어진 것들이에요<br>
      모든 작품은 익명으로 전시되며, 대화 내용은 공개되지 않아요
    </p>
    <a class="back-btn" href="/">← 마인드캔버스로 돌아가기</a>
  </div>

  <div class="stats-bar" id="statsBar" style="display:none;">
    <div class="stat-item">
      <div class="stat-num" id="statCount">0</div>
      <div class="stat-label">작품</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="statEmotions">—</div>
      <div class="stat-label">가장 많은 감정</div>
    </div>
  </div>

  <div class="gallery-grid" id="galleryGrid">
    <div class="loading-wrap" style="grid-column:1/-1;">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
      작품을 불러오는 중...
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-title" id="lightboxTitle"></div>
    <div class="lightbox-tags" id="lightboxTags"></div>
    <div class="lightbox-date" id="lightboxDate"></div>
  </div>
</div>

<script>
// Background animation
const bgCanvas = document.getElementById('bgCanvas');
const ctx = bgCanvas.getContext('2d');
let W, H, blobs = [];
function initCanvas() {
  W = bgCanvas.width = window.innerWidth;
  H = bgCanvas.height = window.innerHeight;
  blobs = Array.from({length: 5}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: 200 + Math.random() * 300,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    color: ['#c9a84c','#d4623a','#4a8c7a','#6b5b8a','#3a6ad4'][Math.floor(Math.random()*5)]
  }));
}
function animateBg() {
  ctx.clearRect(0, 0, W, H);
  blobs.forEach(b => {
    b.x += b.vx; b.y += b.vy;
    if (b.x < -b.r) b.x = W + b.r;
    if (b.x > W + b.r) b.x = -b.r;
    if (b.y < -b.r) b.y = H + b.r;
    if (b.y > H + b.r) b.y = -b.r;
    const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, b.color + '18');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animateBg);
}
initCanvas(); animateBg();
window.addEventListener('resize', initCanvas);

// Load public gallery from Supabase
async function loadGallery() {
  try {
    const res = await fetch('/api/gallery');
    const data = await res.json();
    if (!data.items) throw new Error('No items');
    renderGallery(data.items);
  } catch(e) {
    document.getElementById('galleryGrid').innerHTML =
      '<div class="empty-wrap">작품을 불러오는 데 실패했어요<br><span style="font-size:13px; opacity:0.5;">잠시 후 다시 시도해주세요</span></div>';
  }
}

function renderGallery(items) {
  const grid = document.getElementById('galleryGrid');

  if (!items || items.length === 0) {
    grid.innerHTML = '<div class="empty-wrap">아직 전시된 작품이 없어요<br><span style="font-size:13px; opacity:0.5;">첫 번째 작품을 전시해보세요</span></div>';
    return;
  }

  // Stats
  const statsBar = document.getElementById('statsBar');
  statsBar.style.display = 'flex';
  document.getElementById('statCount').textContent = items.length;

  // 가장 많은 감정 계산
  const emotionCount = {};
  items.forEach(item => {
    (item.emotions || []).forEach(e => {
      emotionCount[e] = (emotionCount[e] || 0) + 1;
    });
  });
  const topEmotion = Object.entries(emotionCount).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('statEmotions').textContent = topEmotion ? topEmotion[0] : '—';

  grid.innerHTML = items.map((item, idx) => `
    <div class="gallery-card" onclick="openLightbox(${idx})"
      style="animation-delay:${Math.min(idx * 0.05, 0.5)}s">
      <img class="gallery-img" src="${item.image_url || ''}" alt="${item.title || ''}"
        onerror="this.style.background='rgba(201,168,76,0.08)'; this.style.minHeight='200px'">
      <div class="gallery-body">
        <div class="gallery-title">${item.title || '무제'}</div>
        <div class="gallery-tags">
          ${(item.emotions || []).slice(0,3).map(e => `<span class="gallery-tag">${e}</span>`).join('')}
        </div>
        <div class="gallery-date">${formatDate(item.created_at)}</div>
      </div>
    </div>
  `).join('');

  window._galleryItems = items;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
}

function openLightbox(idx) {
  const item = window._galleryItems[idx];
  if (!item) return;
  document.getElementById('lightboxImg').src = item.image_url || '';
  document.getElementById('lightboxTitle').textContent = item.title || '무제';
  document.getElementById('lightboxTags').innerHTML =
    (item.emotions || []).map(e => `<span class="gallery-tag">${e}</span>`).join('');
  document.getElementById('lightboxDate').textContent = formatDate(item.created_at);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

loadGallery();
</script>
</body>
</html>
